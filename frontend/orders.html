<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы – Retail Procurement</title>
    <script src="/static/api.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Retail Procurement</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Каталог</a>
                <a class="nav-link" href="cart.html">Корзина</a>
                <a class="nav-link active" href="orders.html">Заказы</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Мои заказы</h1>
        <div id="orders-list"></div>
    </div>

    <script>
        async function loadOrders() {
            try {
                const data = await apiGet('/orders/');
                const container = document.getElementById('orders-list');
                container.innerHTML = '';
                data.results.forEach(order => {
                    const div = document.createElement('div');
                    div.className = 'card mb-3';
                    div.innerHTML = `
                        <div class="card-body">
                            <h5>Заказ №${order.id}</h5>
                            <p>Дата: ${new Date(order.created_at).toLocaleString()}</p>
                            <p>Статус: ${order.status}</p>
                            <ul>${order.items.map(i => `<li>${i.product_name} x${i.quantity} — ${i.total_price} руб.</li>`).join('')}</ul>
                            <p>Общая сумма: ${order.total_price} руб.</p>
                        </div>`;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error(err);
            }
        }

        if (!AUTH_TOKEN) {
            window.location.href = 'login.html';
        } else {
            loadOrders();
        }
    </script>
</body>
</html>
