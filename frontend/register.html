<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация – Retail Procurement</title>
    <script src="/static/api.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Регистрация</h3>
                        <form id="register-form">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="mb-3">
                                <label for="user_type" class="form-label">Роль</label>
                                <select class="form-select" id="user_type">
                                    <option value="client">Покупатель</option>
                                    <option value="supplier">Поставщик</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                        </form>
                        <div id="message" class="mt-2" style="display:none;"></div>
                        <div class="mt-3 text-center">
                            <a href="login.html">Уже есть аккаунт? Войти</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const user_type = document.getElementById('user_type').value;
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'none';

            try {
                const data = await apiPost('/auth/register/', { email, password, user_type });
                msgDiv.textContent = data['Сообщение'] || 'Регистрация успешна!';
                msgDiv.className = 'text-success mt-2';
                msgDiv.style.display = 'block';
            } catch (err) {
                // Парсим ошибки Django/DRF (могут быть массивом)
                let msg = err.message;
                try {
                    const obj = JSON.parse(msg);
                    msg = Object.values(obj).flat().join(', ');
                } catch (_) {}
                msgDiv.textContent = msg;
                msgDiv.className = 'text-danger mt-2';
                msgDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
