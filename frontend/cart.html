<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина – Retail Procurement</title>
    <script src="/static/api.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Retail Procurement</a>
        <div class="navbar-nav">
            <a class="nav-link" href="index.html">Каталог</a>
            <a class="nav-link" href="cart.html">Корзина</a>
            <a class="nav-link" href="orders.html">Заказы</a>
        </div>
        <div class="navbar-nav ms-auto">
            <span id="user-avatar" class="navbar-text"></span>
            <a class="nav-link" href="#" onclick="logout()">Выход</a>
        </div>
    </div>
    </nav>

    <div class="container mt-4">
        <h1>Корзина</h1>
        <div id="cart-items"></div>
        <div class="mt-3">
            <h4>Общая стоимость: <span id="total-price">0</span> руб.</h4>
            <button id="checkout-btn" class="btn btn-success">Оформить заказ</button>
        </div>
        <div id="checkout-form" style="display:none;" class="mt-3">
            <div class="mb-3">
                <label for="address" class="form-label">Адрес доставки</label>
                <input type="text" class="form-control" id="address">
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Телефон</label>
                <input type="text" class="form-control" id="phone">
            </div>
            <button id="confirm-order" class="btn btn-primary">Подтвердить заказ</button>
        </div>
    </div>

    <script>
        async function loadCart() {
            try {
                const cart = await apiGet('/cart/');
                document.getElementById('total-price').textContent = cart.total_price;
                renderCartItems(cart.items);
            } catch (err) {
                console.error(err);
            }
        }

        function renderCartItems(items) {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            if (!items.length) {
                container.innerHTML = '<p>Корзина пуста</p>';
                return;
            }
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card mb-2';
                div.innerHTML = `
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5>${item.product.name}</h5>
                            <p>Цена: ${item.product.price} руб.</p>
                            <p>Количество:
                                <input type="number" value="${item.quantity}" min="1" style="width:60px"
                                    data-item-id="${item.id}" class="qty-input">
                            </p>
                            <p>Сумма: ${item.total_price} руб.</p>
                        </div>
                        <button class="btn btn-danger btn-sm delete-item" data-item-id="${item.id}">Удалить</button>
                    </div>`;
                container.appendChild(div);
            });

            // Обработчики изменения количества
            document.querySelectorAll('.qty-input').forEach(input => {
                input.addEventListener('change', async function() {
                    const itemId = this.dataset.itemId;
                    const qty = parseInt(this.value);
                    if (qty < 1) return;
                    try {
                        await apiPatch(`/cart/items/${itemId}/`, { quantity: qty });
                        loadCart();
                    } catch (err) {
                        alert(err.message);
                    }
                });
            });

            // Обработчики удаления
            document.querySelectorAll('.delete-item').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const itemId = this.dataset.itemId;
                    try {
                        await apiDelete(`/cart/items/${itemId}/delete/`);
                        loadCart();
                    } catch (err) {
                        alert(err.message);
                    }
                });
            });
        }

        document.getElementById('checkout-btn').addEventListener('click', function() {
            document.getElementById('checkout-form').style.display = 'block';
        });

        document.getElementById('confirm-order').addEventListener('click', async function() {
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;
            try {
                const order = await apiPost('/orders/confirm/', { address, phone });
                alert('Заказ создан! ID: ' + order.id);
                window.location.href = 'orders.html';
            } catch (err) {
                alert(err.message);
            }
        });

        if (!AUTH_TOKEN) {
            window.location.href = 'login.html';
        } else {
            loadCart();
        }
    </script>
    <script>
    async function loadProfile() {
        try {
            const data = await apiGet('/user/profile/');
            if (data.avatar_url) {
                document.getElementById('user-avatar').innerHTML =
                    `<img src="${data.avatar_url}" alt="Аватар" width="30" height="30" class="rounded-circle me-2">`;
            }
        } catch (err) {
            console.error(err);
        }
    }

    function logout() {
        clearToken();
        window.location.href = 'login.html';
    }

    if (AUTH_TOKEN) {
        loadProfile();
    }
</script>
</body>
</html>
