<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Завершение входа...</title>
    <script src="/static/api.js"></script>
</head>
<body>
    <script>
        (async function() {
            try {
                // Запрашиваем токены с сервера (сессия передаётся через cookie)
                const response = await fetch('/api/v1/auth/social/token/', {
                    credentials: 'include'
                });
                if (!response.ok) {
                    throw new Error('Ошибка получения токена');
                }
                const data = await response.json();
                setToken(data.access);
                // Перенаправляем в каталог
                window.location.href = 'index.html';
            } catch (err) {
                alert('Не удалось войти через соцсеть. Попробуйте ещё раз.');
                window.location.href = 'login.html';
            }
        })();
    </script>
</body>
</html>
