<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров – Retail Procurement</title>
    <script src="/static/api.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Retail Procurement</a>
        <div class="navbar-nav">
            <a class="nav-link" href="index.html">Каталог</a>
            <a class="nav-link" href="cart.html">Корзина</a>
            <a class="nav-link" href="orders.html">Заказы</a>
        </div>
        <div class="navbar-nav ms-auto">
            <span id="user-avatar" class="navbar-text"></span>
            <a class="nav-link" href="#" onclick="logout()">Выход</a>
        </div>
    </div>
    </nav>

    <div class="container mt-4">
        <h1>Каталог товаров</h1>
        <div class="row mb-3">
            <div class="col-md-3">
                <input type="text" class="form-control" id="search" placeholder="Поиск по названию">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="category-filter">
                    <option value="">Все категории</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-primary" id="search-btn">Найти</button>
            </div>
        </div>
        <div class="row" id="product-list"></div>
        <nav id="pagination" class="mt-3"></nav>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;

        async function loadProducts(page = 1) {
            const search = document.getElementById('search').value;
            const category = document.getElementById('category-filter').value;
            let url = `/products/?page=${page}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (category) url += `&category=${encodeURIComponent(category)}`;

            try {
                const data = await apiGet(url);
                totalPages = Math.ceil(data.count / 10);
                renderProducts(data.results);
                renderPagination();
            } catch (err) {
                console.error(err);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-list');
            container.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'col-md-4 mb-3';
                card.innerHTML = `
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${p.name}</h5>
                            <p class="card-text">Категория: ${p.category}</p>
                            <p class="card-text">Поставщик: ${p.supplier}</p>
                            <p class="card-text">Цена: ${p.price} руб.</p>
                            <p class="card-text">Остаток: ${p.quantity}</p>
                            <button class="btn btn-primary add-to-cart" data-id="${p.id}">В корзину</button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
            // Навешиваем обработчики на кнопки
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const productId = this.dataset.id;
                    try {
                        await apiPost('/cart/items/', { product_id: parseInt(productId), quantity: 1 });
                        alert('Добавлено в корзину!');
                    } catch (err) {
                        alert('Ошибка: ' + err.message);
                    }
                });
            });
        }

        function renderPagination() {
            const pag = document.getElementById('pagination');
            pag.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'} me-1`;
                btn.textContent = i;
                btn.addEventListener('click', () => {
                    currentPage = i;
                    loadProducts(i);
                });
                pag.appendChild(btn);
            }
        }

        document.getElementById('search-btn').addEventListener('click', () => {
            currentPage = 1;
            loadProducts(1);
        });

        // Загружаем список категорий для фильтра
        async function loadCategories() {
            // Твой API не имеет эндпоинта списка категорий, поэтому пока оставим статично
            // Можно добавить позже
        }

        // Проверяем авторизацию
        if (!AUTH_TOKEN) {
            window.location.href = 'login.html';
        } else {
            loadProducts();
        }
    </script>
    <script>
    async function loadProfile() {
        try {
            const data = await apiGet('/user/profile/');
            if (data.avatar_url) {
                document.getElementById('user-avatar').innerHTML =
                    `<img src="${data.avatar_url}" alt="Аватар" width="30" height="30" class="rounded-circle me-2">`;
            }
        } catch (err) {
            console.error(err);
        }
    }

    function logout() {
        clearToken();
        window.location.href = 'login.html';
    }

    if (AUTH_TOKEN) {
        loadProfile();
    }
</script>
</body>
</html>
